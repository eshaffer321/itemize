# Monarch Sync Backend Configuration

# Provider configurations
providers:
  walmart:
    enabled: true
    rate_limit: 2s
    lookback_days: 14
    max_orders: 0  # 0 = no limit
    debug: false
  
  costco:
    enabled: true
    rate_limit: 2s
    lookback_days: 14
    max_orders: 0
    debug: false
    # Costco-specific settings (set via environment variables)
    email: "${COSTCO_EMAIL}"
    password: "${COSTCO_PASSWORD}"
    warehouse_number: "${COSTCO_WAREHOUSE}"

  amazon:
    enabled: true
    rate_limit: 1s
    lookback_days: 14
    max_orders: 0
    debug: false
    account_name: "${AMAZON_ACCOUNT_NAME}"
    cookie_file: "${AMAZON_COOKIE_FILE}"

  homedepot:
    enabled: true
    rate_limit: 1s
    lookback_days: 14
    max_orders: 0
    debug: false
    # Optional override — empty means ~/.homedepot-api/cookies.json.
    cookie_file: "${HOMEDEPOT_COOKIE_FILE}"

# Monarch API configuration
monarch:
  api_key: "${MONARCH_TOKEN}"

# OpenAI configuration
openai:
  api_key: "${OPENAI_API_KEY}"
  model: "gpt-5.4-nano"

# Anthropic (Claude) configuration — used when CATEGORIZER_PROVIDER=anthropic
# or when ANTHROPIC_API_KEY is the only LLM key set.
anthropic:
  api_key: "${ANTHROPIC_API_KEY}"
  model: "claude-haiku-4-5-20251001"

# Categorizer backend selection.
# Leave provider empty to auto-detect from which API key is set.
# Set to "openai" or "anthropic" to force a specific backend.
categorizer:
  provider: "${CATEGORIZER_PROVIDER}"

# Storage configuration
storage:
  database_path: "monarch_sync.db"  # Consolidated database

# Observability configuration
observability:
  logging:
    level: "info"
    format: "json"
    file_path: "monarch_sync.log"  # Logs to both stdout and this file
  
  metrics:
    enabled: true
    port: 9090
  
  tracing:
    enabled: false
    endpoint: "localhost:4317"
